name: Update ChangeLogs

on:
    workflow_dispatch:
    workflow_run:
        workflows: ["Publish"]
        types:
            - completed

concurrency:
    group: update-changelogs-${{ github.ref }}
    cancel-in-progress: true

permissions: {}

jobs:
    update_changelogs:
        if: >-
            github.event_name == 'workflow_dispatch' ||
            github.event.workflow_run.conclusion == 'success'
        permissions:
            checks: write
            contents: write
            pull-requests: write
        runs-on: windows-latest
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout repository (Full history)
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Create Check Run
              id: create_check
              env:
                  GH_TOKEN: ${{ github.token }}
              shell: pwsh
              run: |
                  $headSha = (git rev-parse HEAD).Trim()
                  if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($headSha)) {
                      throw 'Unable to resolve the checked-out commit for the changelog check run.'
                  }

                  $checkId = gh api -X POST -H "Accept: application/vnd.github+json" `
                    -H "X-GitHub-Api-Version: 2022-11-28" `
                    -f name='Update ChangeLogs' `
                    -f head_sha="$headSha" `
                    -f status='in_progress' `
                    -f 'output[title]=Update ChangeLogs' `
                    -f 'output[summary]=Changelog update in progress' `
                    --jq '.id' `
                    "/repos/$env:GITHUB_REPOSITORY/check-runs"
                  "CHECKID=$checkId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              shell: pwsh
              run: npm ci --force

            - name: Generate CHANGELOG.md files (With verbose logging)
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: pwsh
              run: |
                  echo "Generating changelogs with git-cliff..."
                  npm run --silent changelog:generate -- --verbose
                  Get-ChildItem -Name

            - name: Create Pull Request for changelogs
              uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
              with:
                  commit-message: "chore: update changelogs [skip ci]"
                  title: "chore: update changelogs"
                  body: "Automated changelog update via GitHub Actions.\n\nThis PR was created automatically and will not be merged automatically."
                  branch: "chore/update-changelogs"
                  add-paths: "**/CHANGELOG.md"
                  delete-branch: false
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Update Check Run - Changelogs Generated
              if: success()
              env:
                  GH_TOKEN: ${{ github.token }}
              shell: pwsh
              run: |
                  $body = @'
                  {
                    "status": "in_progress",
                    "output": {
                      "title": "Update ChangeLogs",
                      "summary": "Changelogs generated. Creating PR..."
                    }
                  }
                  '@
                  $body | gh api -X PATCH -H "Accept: application/vnd.github+json" `
                    -H "X-GitHub-Api-Version: 2022-11-28" `
                    "/repos/$env:GITHUB_REPOSITORY/check-runs/$env:CHECKID" --input -

            - name: Complete Check Run
              if: always()
              env:
                  GH_TOKEN: ${{ github.token }}
              shell: pwsh
              run: |
                  if ([string]::IsNullOrWhiteSpace($env:CHECKID)) {
                      Write-Warning 'No changelog check run was created; there is nothing to complete.'
                      return
                  }

                  $jobStatus = '${{ job.status }}'
                  $conclusion = if ($jobStatus -eq 'success') { 'success' } else { 'failure' }
                  $summary = if ($conclusion -eq 'success') {
                      'Changelog update workflow completed successfully.'
                  }
                  else {
                      "Changelog update workflow finished with job status '$jobStatus'."
                  }

                  $body = @{
                      conclusion = $conclusion
                      output = @{
                          title = 'Update ChangeLogs'
                          summary = $summary
                      }
                  } | ConvertTo-Json -Depth 3

                  $body | gh api -X PATCH -H "Accept: application/vnd.github+json" `
                    -H "X-GitHub-Api-Version: 2022-11-28" `
                    "/repos/$env:GITHUB_REPOSITORY/check-runs/$env:CHECKID" --input -

            - name: Add Job Summary
              if: always()
              shell: pwsh
              run: |
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY "## 📝 Changelog Update Workflow Summary"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY "- CHANGELOG.md files were generated or updated in the repository and subfolders."
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY "- Any resulting changes were offered to the changelog pull request action."
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY "- The check run reflects the workflow's actual result."
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY "- Workflow completed with status: ${{ job.status }}."
