# yaml-language-server: $schema=https://www.schemastore.org/gitleaks.json

title = "Nick2bad4u shared Gitleaks configuration"

[extend]
    path = "node_modules/gitleaks-config-nick2bad4u/gitleaks.toml"

# Keep the legacy singular table until the reusable workflow's bundled Gitleaks version is
# new enough for the v8.25+ `[[allowlists]]` syntax used by the shared configuration.
[allowlist]
    description = "Ignore local scratch output and obvious non-secret placeholders"
    paths       = [ '''^temp/''' ]
    regexes     = [ '''^(?:Read-Host|required|your-token-here)$''' ]
